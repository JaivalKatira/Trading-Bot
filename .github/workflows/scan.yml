name: Scan Daily Signals

on:
  schedule:
    # 10:30 UTC = 4:00 PM IST, Monday-Friday
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scripts/scan_daily.py

      - name: Commit signals.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv
          git diff --staged --quiet || git commit -m "Update signals.csv [skip ci]"
          git push
